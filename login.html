<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stüssy | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/assets/cropped_circle_image.png">
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body class="bg-white text-black font-sans flex items-center justify-center h-screen animate-[fadeIn_0.6s_ease-in-out_forwards]">

  <div class="w-full max-w-md border border-gray-300 p-10 shadow-lg">
    <h2 class="text-3xl font-bold mb-6 text-center">Login</h2>
    <form>
      <input type="email" placeholder="Email" class="w-full border p-3 mb-4">
      <input type="password" placeholder="Password" class="w-full border p-3 mb-6">
      <a href="/index.html" class="w-full bg-black text-white py-3 hover:opacity-70 block text-center">
        Sign In
      </a>
    </form>
    <p class="mt-6 text-center">Don’t have an account? <a href="/register.html" class="underline">Register</a></p>
  </div>
</body>
</html>
